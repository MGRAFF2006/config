# Alacritty — Desktop (DWM/X11) overrides
# Symlinked as machine.toml by link-home.sh on the desktop
# Note: opacity/blur is handled by picom, not alacritty

[window]
dimensions = { columns = 130, lines = 40 }
startup_mode = "Windowed"
opacity = 1.0   # picom handles transparency

[font]
size = 12.0
offset = { x = 0, y = 0 }
glyph_offset = { x = 0, y = 0 }

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"
